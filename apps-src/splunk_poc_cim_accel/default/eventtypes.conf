# eventtypes.conf
# ------------------------------------------------------------------------------
# Stock Splunk_TA_aws (8.1.1) does NOT ship eventtypes that tag CloudTrail
# IAM/STS auth events as `authentication`, so the CIM Authentication datamodel
# stays empty. These stanzas backfill that gap. Each eventtype is the narrowest
# search that uniquely identifies the event class; tags.conf attaches the
# `authentication` (+ `success`/`failure`) tags that the datamodel constrains on.
#
# Scope is intentionally limited to console + STS auth-shaped events:
#   ConsoleLogin (success/failure), AssumeRole(WithSAML|WithWebIdentity),
#   SwitchRole, GetSessionToken.
# ------------------------------------------------------------------------------

# Successful AWS console sign-in. responseElements.ConsoleLogin is the
# authoritative outcome field in the CloudTrail event body.
[aws_cloudtrail_console_login_success]
search = sourcetype=aws:cloudtrail eventName=ConsoleLogin "responseElements.ConsoleLogin"=Success

# Failed AWS console sign-in (wrong password, MFA fail, etc.).
[aws_cloudtrail_console_login_failure]
search = sourcetype=aws:cloudtrail eventName=ConsoleLogin "responseElements.ConsoleLogin"=Failure

# IAM role assumption via STS. Covers the base call and the SAML / OIDC
# federated variants. Treated as successful auth unless errorCode is present
# (handled by EVAL in props.conf).
[aws_cloudtrail_assume_role]
search = sourcetype=aws:cloudtrail (eventName=AssumeRole OR eventName=AssumeRoleWithSAML OR eventName=AssumeRoleWithWebIdentity)

# Console "Switch Role" action (cross-account role assumption from the UI).
[aws_cloudtrail_switch_role]
search = sourcetype=aws:cloudtrail eventName=SwitchRole

# Temporary credential issuance for an IAM user (long-term creds -> session).
[aws_cloudtrail_get_session_token]
search = sourcetype=aws:cloudtrail eventName=GetSessionToken
