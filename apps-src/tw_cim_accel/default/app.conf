[install]
state = enabled
is_configured = true

[ui]
is_visible = true
label = TWAI CIM Acceleration

[launcher]
author = TotallyWildAi
description = Enables Data Model Acceleration on CIM datamodels for the splunk-detection-poc (Change, Authentication). Ships CIM Authentication mapping for CloudTrail + a benchmark dashboard. App name intentionally starts with `tw_` so it sorts AFTER `Splunk_SA_CIM` in case-insensitive alphabetical merge order — Splunk_SA_CIM ships `acceleration=false` in its default datamodels.conf and any `splunk_*`-prefixed override would lose the precedence battle.
version = 0.1.1

[package]
id = tw_cim_accel
