# tags.conf
# ------------------------------------------------------------------------------
# The CIM Authentication datamodel's root event constraint is essentially
# `tag=authentication`, with child datasets keyed off `tag=success`/`tag=failure`.
# These stanzas hang those tags off the eventtypes defined in eventtypes.conf.
#
# Tag-on-eventtype is the standard CIM mapping pattern (vs tag-on-host or
# tag-on-source) and is how Splunk_SA_CIM expects add-on authors to enroll
# new sourcetypes into a datamodel.
# ------------------------------------------------------------------------------

[eventtype=aws_cloudtrail_console_login_success]
authentication = enabled
success = enabled

[eventtype=aws_cloudtrail_console_login_failure]
authentication = enabled
failure = enabled

# AssumeRole / SwitchRole / GetSessionToken: success is implicit when the
# event is logged without errorCode. We tag `authentication` here and let the
# props.conf EVAL set `action` (success vs failure) per-event based on the
# presence of errorCode, rather than baking outcome into the eventtype.
[eventtype=aws_cloudtrail_assume_role]
authentication = enabled

[eventtype=aws_cloudtrail_switch_role]
authentication = enabled

[eventtype=aws_cloudtrail_get_session_token]
authentication = enabled
