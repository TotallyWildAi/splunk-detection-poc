# Source-of-truth for the CIM datamodel acceleration overrides on this POC.
#
# Splunk's app-precedence merge does NOT pick up datamodel acceleration
# overrides from a separate app like this one — even when alphabetical
# sorting puts our app after Splunk_SA_CIM, the override is silently
# ignored (verified via `splunk btool datamodels list Change --debug`).
# The only reliable path is to land these stanzas in
# `Splunk_SA_CIM/local/datamodels.conf` directly. install-apps.sh on the
# EC2 syncs this file into that location after every install run, so
# tw_cim_accel/default/datamodels.conf remains the single committed
# source-of-truth — Splunk_SA_CIM/local/datamodels.conf is a generated
# artifact.
#
# `tags_whitelist` is the key performance knob: the acceleration summary
# search only runs over events carrying one of the listed tags, instead
# of scanning every event in the indexer. The values below are Splunk's
# defaults (captured from the UI toggle on 2026-05-13) — extend the
# `cloud` set if we add data sources whose tagging convention differs.

[Authentication]
acceleration = true
acceleration.earliest_time = -1w
acceleration.cron_schedule = */5 * * * *
acceleration.hunk.dfs_block_size = 0
acceleration.max_time = 3600
tags_whitelist = cleartext,cloud,default,insecure,multifactor,pci,privileged

[Change]
acceleration = true
acceleration.earliest_time = -1w
acceleration.cron_schedule = */5 * * * *
acceleration.hunk.dfs_block_size = 0
acceleration.max_time = 3600
tags_whitelist = account,audit,cloud,delete,endpoint,network,pci

# Network_Traffic populated by aws:cloudwatchlogs:vpcflow events (TA-aws
# ships the eventtypes that tag VPC flow records with `network` and
# `communicate`, so no first-party tagging fix is required — unlike
# Authentication, which needed Phase 3.1). Splunk_SA_CIM's default
# tags_whitelist for Network_Traffic is `pci,cloud`; we extend it with
# `network` so the summary doesn't depend on a separate cloud-tagging path.

[Network_Traffic]
acceleration = true
acceleration.earliest_time = -1w
acceleration.cron_schedule = */5 * * * *
acceleration.hunk.dfs_block_size = 0
acceleration.max_time = 3600
tags_whitelist = cloud,network,pci
