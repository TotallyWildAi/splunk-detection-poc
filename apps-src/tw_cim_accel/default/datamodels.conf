# Override Splunk_SA_CIM defaults to turn on Data Model Acceleration for the
# datamodels CloudTrail events populate. With acceleration enabled, every
# 5 minutes Splunk runs a summary search over the previous N days and writes
# the results to tsidx files, so |tstats queries against the datamodel run
# in milliseconds instead of scanning raw events.
#
# `earliest_time = -7d` matches `backfill_time` so the initial build covers
# the last 7 days. For a POC with bursty/short data, shrink to -1d. For
# production, expand to -30d or longer.

[Change]
acceleration = 1
acceleration.earliest_time = -7d
acceleration.cron_schedule = */5 * * * *
acceleration.backfill_time = -7d
acceleration.max_time = 3600

[Authentication]
acceleration = 1
acceleration.earliest_time = -7d
acceleration.cron_schedule = */5 * * * *
acceleration.backfill_time = -7d
acceleration.max_time = 3600
