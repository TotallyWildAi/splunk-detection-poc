# props.conf
# ------------------------------------------------------------------------------
# Populate the CIM Authentication datamodel's required + recommended fields
# on top of `sourcetype=aws:cloudtrail`. CloudTrail's raw JSON shape doesn't
# match CIM field names, and TA-aws 8.1.1 doesn't ship the aliases either, so
# we layer them here. All work is done at search time via FIELDALIAS and EVAL
# to avoid touching the index pipeline (no transforms.conf, no re-index).
#
# CIM Authentication required: action, app, dest, src, user, signature
# CIM Authentication optional used here: status, src_user, authentication_method
# ------------------------------------------------------------------------------

[aws:cloudtrail]

# --- direct field aliases (raw CloudTrail JSON key -> CIM field) -------------
# KV_MODE=json on this sourcetype (default in TA-aws) auto-extracts dotted
# paths like `userIdentity.userName`, so we can alias them straight across.
FIELDALIAS-cim_src_from_sourceIP        = sourceIPAddress AS src
FIELDALIAS-cim_user_from_userName       = userIdentity.userName AS user
FIELDALIAS-cim_user_arn_from_arn        = userIdentity.arn AS user_arn
FIELDALIAS-cim_dest_from_account        = recipientAccountId AS dest
FIELDALIAS-cim_http_ua_from_userAgent   = userAgent AS http_user_agent
FIELDALIAS-cim_authmethod_from_mfa      = additionalEventData.MFAUsed AS authentication_method
FIELDALIAS-cim_session_id_from_token    = userIdentity.accessKeyId AS session_id

# --- user: fall back to ARN, then to type, when userName is empty -----------
# AssumeRole'd sessions and root logins frequently have no userIdentity.userName;
# without this coalesce the CIM `user` field is null and detections miss them.
EVAL-user      = coalesce('userIdentity.userName', 'userIdentity.arn', 'userIdentity.type', "unknown")

# --- src_user: principal that initiated the call (for AssumeRole chains) ----
# For STS calls, userIdentity.principalId / arn is the *caller*; the role
# being assumed is in requestParameters.roleArn. CIM defines src_user as the
# user initiating the auth, which maps to the CloudTrail principal.
EVAL-src_user  = coalesce('userIdentity.principalId', 'userIdentity.arn')

# --- action: success / failure / error per CIM allowed values ---------------
# Priority:
#   1. ConsoleLogin uses its explicit responseElements.ConsoleLogin verdict.
#   2. Any other event with errorCode set is a failure.
#   3. Default: success (CloudTrail only logs completed API calls).
EVAL-action    = case( \
    eventName=="ConsoleLogin" AND 'responseElements.ConsoleLogin'=="Success", "success", \
    eventName=="ConsoleLogin" AND 'responseElements.ConsoleLogin'=="Failure", "failure", \
    isnotnull(errorCode), "failure", \
    1==1, "success")

# --- status: human-readable outcome (CIM optional, mirrors `action`) --------
EVAL-status    = if(action=="success", "success", "failure")

# --- signature: the auth method / event verb. Most useful pivot field for
# distinguishing console vs federated vs role-assumption events in dashboards.
EVAL-signature = eventName

# --- app: which AWS service performed the auth. eventSource is `signin.amazonaws.com`
# for console, `sts.amazonaws.com` for STS calls -- both already CIM-shaped enough
# to use directly, so just alias it. Fallback keeps app non-null if eventSource
# is somehow missing.
EVAL-app       = coalesce(eventSource, "aws")

# --- reason: surface CloudTrail's errorMessage for failed auth (CIM optional)
EVAL-reason    = coalesce(errorMessage, errorCode)
