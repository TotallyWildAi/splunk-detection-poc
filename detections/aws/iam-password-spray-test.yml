id: d67f1869-3bf7-47de-a21c-5fa4531d35d8
name: IAM Password Spray Test
version: 1
author: TotallyWildAi
date: '2026-05-13'
description: >-
  Detects bursts of failed ConsoleLogin events originating from a single source
  IP targeting many distinct IAM usernames within a short window, a pattern
  consistent with password spraying (T1110.003). Adversaries use this technique
  to avoid per-account lockout thresholds while systematically testing
  credentials at scale; even a small number of successes can yield initial
  access to an AWS environment.
type: TTP
data_source:
  - aws_cloudtrail
search: >-
  search index=main sourcetype=aws:cloudtrail eventName=ConsoleLogin
    responseElements.ConsoleLogin=Failure
  | stats
      count as failedAttempts
      dc(userIdentity.userName) as distinctUsers
      values(userIdentity.userName) as attemptedUsers
      min(_time) as firstTime
      max(_time) as lastTime
    by sourceIPAddress
  | where distinctUsers >= 5 AND failedAttempts >= 10
  | eval firstTime=strftime(firstTime,"%Y-%m-%dT%H:%M:%SZ"),
         lastTime=strftime(lastTime,"%Y-%m-%dT%H:%M:%SZ")
how_to_implement: >-
  Requires Splunk_TA_aws ingesting AWS CloudTrail management events into
  index=main with sourcetype=aws:cloudtrail; ConsoleLogin events and the
  responseElements.ConsoleLogin field are not covered by the CIM Authentication
  datamodel, so a raw search is used. The thresholds (distinctUsers >= 5,
  failedAttempts >= 10) should be tuned to your environment's baseline login
  failure rate and the detection is scheduled over a 5-minute window.
known_false_positives: >-
  Misconfigured SSO or federated identity providers may produce bursts of
  failed logins from a single NAT or proxy IP for legitimate users. Tune
  the distinctUsers and failedAttempts thresholds upward, or allowlist known
  corporate egress IPs and federation service source addresses, to reduce
  false positives in environments with centralized proxy egress.
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://github.com/splunk/security_content/blob/develop/detections/cloud/aws_iam_successful_group_delegation_to_existing_role.yml
  - https://docs.aws.amazon.com/awscloudtrail/latest/userguide/cloudtrail-event-reference-record-contents.html
  - https://rhinosecuritylabs.com/aws/aws-iam-user-enumeration/
tags:
  analytic_story:
    - AWS Identity & Access Management
    - Compromised User Account
  asset_type: IAM User
  confidence: 75
  impact: 80
  mitre_attack_id:
    - T1110.003
  kill_chain_phases:
    - Exploitation
  cis20:
    - CIS 6
    - CIS 16
  nist:
    - DE.CM
    - PR.AC
tests:
  - name: Password spray from single IP across multiple IAM users
    attack_data:
      - file: aws/cloudtrail/console_login_failures_spray.json
        sourcetype: aws:cloudtrail
        source: cloudtrail
    asset_pass_criteria: >-
      search returns >=1 event with sourceIPAddress matching the spray IP,
      distinctUsers >= 5, and failedAttempts >= 10
